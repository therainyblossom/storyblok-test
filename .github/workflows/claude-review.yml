name: Claude Test Review

on:
  pull_request:
    types: [opened]
    branches: [main, dev]

permissions:
  pull-requests: write

jobs:
  trigger-claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@claude Generate and run e2e tests for the components changed in this PR. Read the e2e-test skill, conventions, and existing tests first. Commit any new test files to the PR branch.'
            });
