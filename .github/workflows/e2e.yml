name: E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npx nuxt generate
        env:
          NUXT_PUBLIC_STORYBLOK_ACCESS_TOKEN: ${{ secrets.STORYBLOK_ACCESS_TOKEN }}
          NUXT_PUBLIC_SPACE_ID: ${{ secrets.STORYBLOK_SPACE_ID }}
          NUXT_PUBLIC_NODE_ENV: production
          NUXT_PUBLIC_AUTH_ENABLED: 'false'

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: 'true'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            e2e/test-results/
            e2e/reports/
          retention-days: 14
