name: Auto E2E Tests

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main, dev]
  issue_comment:
    types: [created]

jobs:
  generate-and-run:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npx nuxt generate
        env:
          NUXT_PUBLIC_STORYBLOK_ACCESS_TOKEN: ${{ secrets.STORYBLOK_ACCESS_TOKEN }}
          NUXT_PUBLIC_SPACE_ID: ${{ secrets.STORYBLOK_SPACE_ID }}
          NUXT_PUBLIC_NODE_ENV: production
          NUXT_PUBLIC_AUTH_ENABLED: 'false'

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Generate and run E2E tests
        uses: anthropics/claude-code-action@v1
        with:
          claude_args: "--max-turns 15 --model claude-sonnet-4-6"
          prompt: |
            You are an E2E test generator for a Nuxt 3 + Storyblok project. Generate and run Playwright accessibility tests for the changes in this PR.

            ## Instructions

            1. Read the PR diff to identify what changed (components, pages, layouts, styles).
            2. Check if existing test files in e2e/tests/ cover the changed components.
               - If tests exist: update them with new test cases for changed functionality, keep existing cases as regression.
               - If no tests exist: generate new spec files.
            3. Read these context files before writing any tests:
               - .claude/skills/e2e-test/SKILL.md (test writing methodology)
               - .claude/skills/shared/conventions.md (test conventions)
               - .claude/skills/shared/risk-patterns.md (what to test)
               - e2e/fixtures/test-constants.ts (test data)
               - e2e/fixtures/base.ts (test fixtures: goToPage, checkA11y, reportA11y)
               - e2e/helpers/accessibility.ts (axe-core helper)
               - e2e/pages/BasePage.ts (page object)
               - e2e/tests/smoke.spec.ts (existing test for reference)
            4. For changed components WITH existing tests:
               - Read the existing spec file
               - Add new test cases for added/changed functionality
               - Keep existing test cases as regression tests
               - Run the full spec file
            5. For changed components WITHOUT tests, generate a spec file that:
               - Tests the pages/components affected by the PR
               - Uses the POM pattern (BasePage or extend it)
               - Imports from e2e/fixtures/base (not @playwright/test directly)
               - Runs checkA11y() on every page visited
               - Uses test constants, not hardcoded values
               - Follows conventions from the shared skills
            6. Run: npx playwright test e2e/tests/ --project=chromium
            7. If tests fail, read the error and fix the TEST (not the app code). Retry once.
            8. Report: what changed, what was tested (new vs regression), and results.

            ## Rules
            - Only generate/modify test files — NEVER modify application code
            - Use optional chaining (?.) for all blok field accesses
            - The site is served locally via webServer in playwright.config.ts
            - Content comes from Storyblok CDN at runtime (SPA, ssr: false)

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-test-results
          path: |
            e2e/test-results/
            e2e/reports/
          retention-days: 14
